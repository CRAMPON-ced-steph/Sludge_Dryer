<head>
    <meta charset="UTF-8">

    <title>M1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.8;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            color: #333;
            background-color: #f9f9f9;
        }

        h1 {
            color: #1a1a1a;
            border-bottom: 3px solid #007bff;
            padding-bottom: 15px;
            margin: 40px 0 30px 0;
            font-size: 2.2em;
        }

        h2 {
            color: #0056b3;
            margin: 35px 0 20px 0;
            font-size: 1.7em;
            border-left: 4px solid #0056b3;
            padding-left: 15px;
        }

        h3 {
            color: #003d82;
            margin: 25px 0 15px 0;
            font-size: 1.3em;
            border-left: 3px solid #003d82;
            padding-left: 12px;
        }

        h4 {
            color: #555;
            margin: 20px 0 10px 0;
            font-size: 1.1em;
        }

        p {
            margin: 15px 0;
            text-align: justify;
        }

        img {
            max-width: 100%;
            height: auto;
            margin: 25px 0;
            border: 1px solid #ddd;
            padding: 8px;
            background-color: #fff;
            border-radius: 4px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        ul, ol {
            margin: 20px 0 20px 30px;
            padding-left: 20px;
        }

        li {
            margin: 10px 0;
            text-align: justify;
        }

        strong {
            font-weight: 600;
            color: #1a1a1a;
        }

        em {
            font-style: italic;
        }

        code {
            background-color: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 25px 0;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .table-container {
            display: flex;
            justify-content: center;
            margin: 25px 0;
        }
    </style>
